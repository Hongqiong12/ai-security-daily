name: Daily Sync

on:
  schedule:
    # 每天 03:00 UTC = 11:00 北京时间，用于校验推送状态
    - cron: '0 3 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify latest daily report exists
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "Today: $DATE"
          echo "=== Recent daily reports ==="
          ls daily-reports/ -la 2>/dev/null || echo "No daily-reports directory"
          find daily-reports/ -name "*.md" -newer README.md 2>/dev/null | head -20 || true
          echo "=== Recent paper files ==="
          find categories/ -name "*.md" -newer README.md 2>/dev/null | head -20 || true
          echo "Sync verification complete."
