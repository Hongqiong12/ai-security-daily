name: Daily Sync

on:
  schedule:
    # 每天 00:30 UTC = 08:30 北京时间
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README
        run: |
          echo "# AI Security Daily Intelligence" > README.md
          echo "Last updated: $(date)" >> README.md
          echo "Reports: ${{ github.event.inputs.reports_count || '0' }}" >> README.md

      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          title: "Daily Update $(date +'%Y-%m-%d')"
          body: "Automated daily update"
          branch: daily-update
